<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICKLE PLAYGROUND</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./main.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=AR+One+Sans&family=Roboto+Flex:opsz@8..144&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        input:focus {
            outline: none;
        }

        button {
            outline: none;
        }

        button:focus,
        button:active {
            outline: none;
        }
    </style>
</head>

<body>
    <div class="flex items-center justify-center h-screen">
        <div class="flex border border-1 rounded-2xl shadow-md p-8 items-center justify-center w-1/2">
            <div class="w-full ml-10 mr-10">
                <div class="items-center">
                    <div class="flex flex-col items-center justify-center">
                        <h1 class="font-bold text-3xl">PICKLE PLAYGROUND</h1>
                        <h6 class="mt-6 text-xl font-bold">Reset Password</h6>
                        <h6 class="text-center pt-3">
                            Provide your registered email to reset your <br>password.
                        </h6>

                        <div class="w-full">
                            <div class="mb-2 mt-5">Your email.</div>
                            <div>
                                <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-md">
                            </div>
                        </div>

                        <div class="flex flex-col justify-center">
                            <button class="border border-2 p-2 px- rounded-xl text-white bg-blue-900 mt-5"
                                onclick="redirectToSendmail()">
                                Send Email
                            </button>
                            <h6 class="mt-8">Don't have an account? <span class="text-blue-600 cursor-pointer"
                                    onclick="redirectToIndex()">Sign
                                    up</span></h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function redirectToIndex() {
            window.location.href = 'index.html'
        }
        function redirectToSendmail() {
            window.location.href = 'sendmail.html'
        }
    </script>

</body>

</html>
