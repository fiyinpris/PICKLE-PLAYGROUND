<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Playground</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(to right, #ff8a00, #e52e71, #1eae98, #5ac18e);
            margin: auto;
        }

        #tools {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
        }

        .tool {
            cursor: pointer;
            padding: 5px 10px;
            background-color: #ddd;
            border: 1px solid #888;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div id="tools">
        <!-- Your tools go here -->
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

</body>

</html>


<script>
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    let currentTool = 'pencil';

    function selectTool(tool) {
        currentTool = tool;
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);

    let isDrawing = false;

    function startDrawing(e) {
        isDrawing = true;
        draw(e);
    }

    function draw(e) {
        if (!isDrawing) return;

        const x = e.clientX - canvas.offsetLeft;
        const y = e.clientY - canvas.offsetTop;

        context.lineWidth = 5;
        context.lineCap = 'round';
        context.strokeStyle = currentTool === 'eraser' ? '#f0f0f0' : '#000';

        context.lineTo(x, y);
        context.stroke();
        context.beginPath();
        context.moveTo(x, y);
    }

    function stopDrawing() {
        isDrawing = false;
        context.beginPath();
    }
</script>

</body>

</html>
